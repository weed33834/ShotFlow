# ShotFlow — 一键部署
# 用法: docker compose up -d
# 默认 SIMULATE_MODE=true，无需任何 API Key 即可体验全链路

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: shotflow-backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - SIMULATE_MODE=true
      - DATABASE_URL=sqlite:///./shotflow.db
      - SECRET_KEY=local-dev-secret-key-not-for-production-32c
    volumes:
      - ./storage:/app/storage
      - ./flows:/app/flows
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: shotflow-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
