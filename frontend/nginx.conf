# ShotFlow — 前端 Nginx 配置
# 托管 Vite 构建产物，并反代后端 API
# 注：worker 进程用户由基础镜像 nginx:alpine 的主 /etc/nginx/nginx.conf 控制（默认 user nginx;），
# 此 conf.d 片段不重复设置以避免 "user directive is not allowed here" 错误。

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 安全响应头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'self'; font-src 'self' data:" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # SPA history 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 反代后端 API（含 SSE）
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 关键：禁用缓冲，保持长连接
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        chunked_transfer_encoding on;
    }

    # SSE 端点单独处理：鉴权 token 走 query string（EventSource 不能自定义请求头），
    # 默认 access log 会把完整 URI 含 token 落盘，这里关闭日志避免 JWT 泄露。
    location = /api/v1/queue/stream/events {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        chunked_transfer_encoding on;
        access_log off;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
