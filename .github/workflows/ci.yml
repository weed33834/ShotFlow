name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===== 后端测试 =====
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff + black + isort)
        run: |
          ruff check .
          black --check .
          isort --check-only .

      - name: Run backend tests
        env:
          DATABASE_URL: "sqlite://"
          # CI 用固定密钥跑测试，避免触发生产环境的默认密钥拦截
          SECRET_KEY: "ci-secret-not-for-production-use-32chars-min"
          REDIS_URL: "redis://localhost:6379/0"
          SIMULATE_MODE: "true"
        run: pytest tests/ -q

  # ===== 前端构建 =====
  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test (vitest)
        run: npm run test

      - name: Build
        run: npm run build

  # ===== 08_Automation 健康检查 + lint =====
  automation:
    name: Automation Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: 08_Automation/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r 08_Automation/requirements-dev.txt

      - name: Lint (ruff + black + isort)
        run: |
          ruff check 08_Automation tests
          black --check 08_Automation tests
          isort --check-only 08_Automation tests

      - name: Project health check
        run: python 08_Automation/project_health_check.py

  # ===== 文档链接校验 =====
  docs-link-check:
    name: Documentation Links
    runs-on: ubuntu-latest
    # 102 个内部链接断链为 main 既有文档债（check_doc_links.py 实测 exit 1），
    # 将在单独 PR 集中修复；此处保持 continue-on-error 非阻断，避免掩盖其余 job 的回归。
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check doc links
        run: python 08_Automation/check_doc_links.py
