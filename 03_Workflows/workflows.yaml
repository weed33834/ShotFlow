# ShotFlow ComfyUI 工作流参数化配置
# 每个工作流对应一个条目，参数化后非程序员也能调整生成参数。
# 由 backend/app/services/workflow_config_service.py 加载。

workflows:
  - name: "Flux_Character_Consistency"
    task_type: "keyframe"
    file_path: "03_Workflows/api/Flux_Character_Consistency_api.json"
    description: "Flux.1 Kontext + IPAdapter 角色一致性关键帧生成"
    parameters:
      - key: "prompt"
        label: "正向提示词"
        type: "text"
        required: true
        default: ""
        node_class: "CLIPTextEncode"
        node_input: "text"
      - key: "negative_prompt"
        label: "负向提示词"
        type: "text"
        required: false
        default: "lowres, bad anatomy, extra fingers, deformed"
        node_class: "CLIPTextEncode"
        node_input: "text"
        node_index: 1  # 第二个 CLIPTextEncode 节点为负向
      - key: "seed"
        label: "随机种子"
        type: "integer"
        required: false
        default: 0
        min: 0
        max: 999999
        node_class: "KSampler"
        node_input: "seed"
      - key: "steps"
        label: "采样步数"
        type: "integer"
        required: false
        default: 28
        min: 1
        max: 100
        node_class: "KSampler"
        node_input: "steps"
      - key: "cfg"
        label: "CFG 引导强度"
        type: "float"
        required: false
        default: 3.5
        min: 1.0
        max: 15.0
        node_class: "KSampler"
        node_input: "cfg"

  - name: "Wan22_Dual_Expert_Video"
    task_type: "video_i2v"
    file_path: "03_Workflows/api/Wan22_Dual_Expert_Video_api.json"
    description: "Wan2.2 I2V 双专家视频生成（High/Low Noise）"
    parameters:
      - key: "prompt"
        label: "正向提示词"
        type: "text"
        required: true
        default: ""
        node_class: "CLIPTextEncode"
        node_input: "text"
      - key: "seed"
        label: "随机种子"
        type: "integer"
        required: false
        default: 0
        min: 0
        max: 999999
        node_class: "KSampler"
        node_input: "seed"
      - key: "negative_prompt"
        label: "负向提示词"
        type: "text"
        required: false
        default: "bad anatomy, deformed face, extra limbs, blurry, low quality, inconsistent character, mutated hands, flickering, distorted motion"
        node_class: "CLIPTextEncode"
        node_input: "text"
        node_index: 1  # 第二个 CLIPTextEncode 节点为负向
      - key: "frames"
        label: "生成帧数"
        type: "integer"
        required: false
        default: 81
        min: 9
        max: 161
        node_class: "WanImageToVideo"
        node_input: "length"
      - key: "fps"
        label: "输出帧率"
        type: "integer"
        required: false
        default: 24
        min: 8
        max: 30
        node_class: "SaveAnimatedWEBP"
        node_input: "fps"
      - key: "steps"
        label: "采样步数"
        type: "integer"
        required: false
        default: 30
        min: 1
        max: 100
        node_class: "KSampler"
        node_input: "steps"
      - key: "cfg"
        label: "CFG 引导强度"
        type: "float"
        required: false
        default: 0.5
        min: 0.0
        max: 15.0
        node_class: "KSampler"
        node_input: "cfg"
